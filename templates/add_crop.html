<!DOCTYPE html>
<html>

<head>

    <title>Add Crop</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="overlay">

    <div class="navbar">

{% if session['role'] == 'admin' %}

<a href="{{ url_for('home') }}">Home</a>

<a href="{{ url_for('view_farmers') }}">
Farmers
</a>

<a href="{{ url_for('view_crops') }}">
Crops
</a>

<a href="{{ url_for('view_fertilizers') }}">
Fertilizers
</a>

<a href="{{ url_for('dashboard') }}">
Dashboard
</a>

{% endif %}

<a href="{{ url_for('logout') }}">
Logout
</a>

</div>

    <div class="form-container">

        <h1>Add Crop</h1>

        <form method="POST">

            <input type="number"
                   name="farmer_id"
                   placeholder="Farmer ID"
                   class="form-control"
                   required>

            <input type="text"
                   name="crop_name"
                   placeholder="Crop Name"
                   class="form-control"
                   required>

            <input type="text"
                   name="fertilizer"
                   placeholder="Fertilizer"
                   class="form-control"
                   required>

            <input type="text"
                   name="season"
                   placeholder="Season"
                   class="form-control"
                   required>

            <input type="number"
                   step="0.01"
                   name="area"
                   placeholder="Area in Acre"
                   class="form-control"
                   required>

            <input type="number"
                   step="0.01"
                   name="yield_kg"
                   placeholder="Yield in KG"
                   class="form-control"
                   required>

            <input type="number"
                   step="0.01"
                   name="selling_price"
                   placeholder="Selling Price"
                   class="form-control"
                   required>

            <input type="number"
                   step="0.01"
                   name="cost_price"
                   placeholder="Cost Price"
                   class="form-control"
                   required>

            <button type="submit"
                    class="btn-submit">

                    Add Crop

            </button>

        </form>

    </div>

</div>

</body>

</html>
