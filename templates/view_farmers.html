<!DOCTYPE html>
<html>

<head>

    <title>View Farmers</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

    <style>

        table{
            width:95%;
            margin:auto;
            margin-top:20px;
            border-collapse:collapse;
            background:white;
        }

        th, td{
            border:1px solid #333;
            padding:10px;
            text-align:center;
        }

        th{
            background:#2c3e50;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

        .page-title{
            text-align:center;
            color:white;
            margin-top:20px;
            font-size:45px;
            font-weight:bold;
        }

        .btn-update{

            background:orange;
            color:white;
            padding:6px 12px;
            text-decoration:none;
            border-radius:5px;
            font-weight:bold;
        }

        .btn-delete{

            background:red;
            color:white;
            padding:6px 12px;
            text-decoration:none;
            border-radius:5px;
            font-weight:bold;
        }

        .btn-details{

            background:green;
            color:white;
            padding:6px 12px;
            text-decoration:none;
            border-radius:5px;
            font-weight:bold;
        }

        .navbar{
            background:#2c3e50;
            padding:15px;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            margin-right:20px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="overlay">

    <!-- NAVBAR -->

    <div class="navbar">

        {% if session['role'] == 'admin' %}

        <a href="{{ url_for('home') }}">Home</a>

        <a href="{{ url_for('view_farmers') }}">
            Farmers
        </a>

        <a href="{{ url_for('view_crops') }}">
            Crops
        </a>

        <a href="{{ url_for('view_fertilizers') }}">
            Fertilizers
        </a>

        <a href="{{ url_for('dashboard') }}">
            Dashboard
        </a>

        {% endif %}

        <a href="{{ url_for('logout') }}">
            Logout
        </a>

    </div>

    <!-- TITLE -->

    <h1 class="page-title">
        Farmers List
    </h1>

    <!-- TABLE -->

    <table>

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Village</th>
            <th>Update</th>
            <th>Delete</th>
            <th>Details</th>

        </tr>

        {% for farmer in farmers %}

        <tr>

            <td>{{ farmer[0] }}</td>
            <td>{{ farmer[1] }}</td>
            <td>{{ farmer[2] }}</td>
            <td>{{ farmer[3] }}</td>

            <!-- UPDATE -->

            <td>

                <a href="{{ url_for('update_farmer', id=farmer[0]) }}"
                   class="btn-update">

                    Update

                </a>

            </td>

            <!-- DELETE -->

            <td>

                <a href="{{ url_for('delete_farmer', id=farmer[0]) }}"
                   class="btn-delete"
                   onclick="return confirm('Delete this farmer?')">

                    Delete

                </a>

            </td>

            <!-- DETAILS -->

            <td>

                <a href="{{ url_for('farmer_details', farmer_id=farmer[0]) }}"
                   class="btn-details">

                    View Details

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>

</html>
