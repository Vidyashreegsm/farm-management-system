<!DOCTYPE html>
<html>

<head>

    <title>Add Fertilizer</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="overlay">

    <div class="navbar">

{% if session['role'] == 'admin' %}

<a href="{{ url_for('home') }}">Home</a>

<a href="{{ url_for('view_farmers') }}">
Farmers
</a>

<a href="{{ url_for('view_crops') }}">
Crops
</a>

<a href="{{ url_for('view_fertilizers') }}">
Fertilizers
</a>

<a href="{{ url_for('dashboard') }}">
Dashboard
</a>

{% endif %}

<a href="{{ url_for('logout') }}">
Logout
</a>

</div>

    <div class="form-container">

        <h1>Add Fertilizer</h1>

        <form method="POST">

            <input type="text"
                   name="fertilizer_name"
                   placeholder="Fertilizer Name"
                   class="form-control"
                   required>

            <input type="text"
                   name="company"
                   placeholder="Company Name"
                   class="form-control"
                   required>

            <input type="number"
                   name="quantity_available"
                   placeholder="Quantity Available"
                   class="form-control"
                   required>

            <input type="number"
                   step="0.01"
                   name="price_per_bag"
                   placeholder="Price Per Bag"
                   class="form-control"
                   required>

            <button type="submit"
                    class="btn-submit">

                    Add Fertilizer

            </button>

        </form>

    </div>

</div>

</body>

</html>
