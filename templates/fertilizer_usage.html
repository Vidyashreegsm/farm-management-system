<!DOCTYPE html>
<html>

<head>

    <title>Fertilizer Usage</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="overlay">

    <div class="navbar">

{% if session['role'] == 'admin' %}

<a href="{{ url_for('home') }}">Home</a>

<a href="{{ url_for('view_farmers') }}">
Farmers
</a>

<a href="{{ url_for('view_crops') }}">
Crops
</a>

<a href="{{ url_for('view_fertilizers') }}">
Fertilizers
</a>

<a href="{{ url_for('dashboard') }}">
Dashboard
</a>

{% endif %}

<a href="{{ url_for('logout') }}">
Logout
</a>

</div>

    <div class="form-container">

        <h1>Fertilizer Usage</h1>

        <form method="POST">

            <input type="number"
                   name="farmer_id"
                   placeholder="Farmer ID"
                   class="form-control"
                   required>

            <input type="number"
                   name="fertilizer_id"
                   placeholder="Fertilizer ID"
                   class="form-control"
                   required>

            <input type="text"
                   name="crop_name"
                   placeholder="Crop Name"
                   class="form-control"
                   required>

            <input type="number"
                   step="0.01"
                   name="quantity_used"
                   placeholder="Quantity Used"
                   class="form-control"
                   required>

            <input type="date"
                   name="usage_date"
                   class="form-control"
                   required>

            <button type="submit"
                    class="btn-submit">

                    Save Usage

            </button>

        </form>

    </div>

</div>

</body>

</html>
