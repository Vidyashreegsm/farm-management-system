<!DOCTYPE html>
<html>

<head>

    <title>Search Farmer</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

    <style>

        table{
            width:90%;
            margin:auto;
            border-collapse:collapse;
            background:white;
        }

        th, td{
            border:1px solid #333;
            padding:12px;
            text-align:center;
        }

        th{
            background:#2c3e50;
            color:white;
        }

        tr:nth-child(even){
            background:#f2f2f2;
        }

    </style>

</head>

<body>

<div class="overlay">

    <div class="navbar">

{% if session['role'] == 'admin' %}

<a href="{{ url_for('home') }}">Home</a>

<a href="{{ url_for('view_farmers') }}">
Farmers
</a>

<a href="{{ url_for('view_crops') }}">
Crops
</a>

<a href="{{ url_for('view_fertilizers') }}">
Fertilizers
</a>

<a href="{{ url_for('dashboard') }}">
Dashboard
</a>

{% endif %}

<a href="{{ url_for('logout') }}">
Logout
</a>

</div>

    <div class="form-container">

        <h1>Search Farmer</h1>

        <form method="POST">

            <input type="text"
                   name="keyword"
                   placeholder="Enter Name or Village"
                   class="form-control">

            <button class="btn-submit">

                Search

            </button>

        </form>

    </div>

    <br><br>

    <table>

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Village</th>

        </tr>

        {% for farmer in farmers %}

        <tr>

            <td>{{ farmer[0] }}</td>
            <td>{{ farmer[1] }}</td>
            <td>{{ farmer[2] }}</td>
            <td>{{ farmer[3] }}</td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>

</html>
